name: Actualizar Resultados Mundial 2026

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch y procesar resultados
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import json
          from datetime import datetime, timezone, timedelta

          TEAM_MAP = {
            "Mexico": "México",
            "South Africa": "Sudáfrica",
            "South Korea": "Corea del Sur",
            "Czech Republic": "Rep. Checa",
            "Canada": "Canadá",
            "Bosnia and Herzegovina": "Bosnia y Herc.",
            "Qatar": "Catar",
            "Switzerland": "Suiza",
            "Brazil": "Brasil",
            "Morocco": "Marruecos",
            "Haiti": "Haití",
            "Scotland": "Escocia",
            "United States": "Estados Unidos",
            "Paraguay": "Paraguay",
            "Australia": "Australia",
            "Turkey": "Turquía",
            "Germany": "Alemania",
            "Curaçao": "Curazao",
            "Curacao": "Curazao",
            "Ivory Coast": "Costa de Marfil",
            "Ecuador": "Ecuador",
            "Netherlands": "Países Bajos",
            "Japan": "Japón",
            "Sweden": "Suecia",
            "Tunisia": "Túnez",
            "Belgium": "Bélgica",
            "Egypt": "Egipto",
            "Iran": "Irán",
            "New Zealand": "Nueva Zelanda",
            "Spain": "España",
            "Cape Verde": "Cabo Verde",
            "Saudi Arabia": "Arabia Saudí",
            "Uruguay": "Uruguay",
            "France": "Francia",
            "Senegal": "Senegal",
            "Iraq": "Irak",
            "Norway": "Noruega",
            "Argentina": "Argentina",
            "Algeria": "Argelia",
            "Austria": "Austria",
            "Jordan": "Jordania",
            "Portugal": "Portugal",
            "DR Congo": "RD Congo",
            "Uzbekistan": "Uzbekistán",
            "Colombia": "Colombia",
            "England": "Inglaterra",
            "Croatia": "Croacia",
            "Ghana": "Ghana",
            "Panama": "Panamá",
          }

          def t(name):
            return TEAM_MAP.get(name, name)

          url = "https://worldcup26.ir/get/games"
          try:
            req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
            with urllib.request.urlopen(req, timeout=15) as r:
              data = json.loads(r.read().decode())
          except Exception as e:
            print(f"Error fetching: {e}")
            exit(0)

          games = data.get("games", [])
          results = {}
          kickoffs = {}  # key -> ISO datetime CEST para bloqueo

          OFFSET_TO_CEST = timedelta(hours=8)

          for g in games:
            if g.get("type") != "group":
              continue

            home_en = g.get("home_team_name_en", "")
            away_en = g.get("away_team_name_en", "")
            home = t(home_en)
            away = t(away_en)
            group = g.get("group", "")

            if not group or len(group) != 1:
              continue

            key = f"{group}_{home}_{away}"

            local_date_str = g.get("local_date", "")
            try:
              local_dt = datetime.strptime(local_date_str, "%m/%d/%Y %H:%M")
              cest_dt = local_dt + OFFSET_TO_CEST
              kickoffs[key] = cest_dt.strftime("%Y-%m-%dT%H:%M")
            except:
              pass

            if g.get("finished", "FALSE") != "TRUE":
              continue

            try:
              home_score = int(g.get("home_score", 0))
              away_score = int(g.get("away_score", 0))
            except:
              continue

            if home_score > away_score:
              result = "1"
            elif home_score == away_score:
              result = "X"
            else:
              result = "2"

            results[key] = result

          output = {
            "updated": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
            "results": results,
            "kickoffs": kickoffs
          }

          with open("results.json", "w", encoding="utf-8") as f:
            json.dump(output, f, ensure_ascii=False, indent=2)

          print(f"✅ {len(results)} resultados y {len(kickoffs)} horarios guardados en results.json")
          PYEOF

      - name: Commit y push results.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          git diff --staged --quiet || git commit -m "🤖 Resultados actualizados $(date +'%Y-%m-%d %H:%M CEST')"
          git push
