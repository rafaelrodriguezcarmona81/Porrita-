name: Actualizar Resultados Mundial 2026

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch resultados y generar results.json
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import json

          # Mapa de nombres en inglés (openfootball) a nombres en español (porra)
          TEAM_MAP = {
            "Mexico": "México", "South Africa": "Sudáfrica",
            "South Korea": "Corea del Sur", "Czech Republic": "Rep. Checa",
            "Canada": "Canadá", "Bosnia-Herzegovina": "Bosnia y Herc.",
            "Qatar": "Catar", "Switzerland": "Suiza",
            "Brazil": "Brasil", "Morocco": "Marruecos",
            "Haiti": "Haití", "Scotland": "Escocia",
            "United States": "Estados Unidos", "Paraguay": "Paraguay",
            "Australia": "Australia", "Turkey": "Turquía",
            "Germany": "Alemania", "Curacao": "Curazao",
            "Ivory Coast": "Costa de Marfil", "Ecuador": "Ecuador",
            "Netherlands": "Países Bajos", "Japan": "Japón",
            "Sweden": "Suecia", "Tunisia": "Túnez",
            "Belgium": "Bélgica", "Egypt": "Egipto",
            "Iran": "Irán", "New Zealand": "Nueva Zelanda",
            "Spain": "España", "Cape Verde": "Cabo Verde",
            "Saudi Arabia": "Arabia Saudí", "Uruguay": "Uruguay",
            "France": "Francia", "Senegal": "Senegal",
            "Iraq": "Irak", "Norway": "Noruega",
            "Argentina": "Argentina", "Algeria": "Argelia",
            "Austria": "Austria", "Jordan": "Jordania",
            "Portugal": "Portugal", "DR Congo": "RD Congo",
            "Uzbekistan": "Uzbekistán", "Colombia": "Colombia",
            "England": "Inglaterra", "Croatia": "Croacia",
            "Ghana": "Ghana", "Panama": "Panamá",
          }

          def t(name):
            return TEAM_MAP.get(name, name)

          url = "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json"
          try:
            with urllib.request.urlopen(url, timeout=15) as r:
              data = json.loads(r.read().decode())
          except Exception as e:
            print(f"Error fetching data: {e}")
            exit(0)

          results = {}
          for match in data.get("matches", []):
            score1 = match.get("score1")
            score2 = match.get("score2")
            if score1 is None or score2 is None:
              continue
            team1 = t(match.get("team1", {}).get("name", ""))
            team2 = t(match.get("team2", {}).get("name", ""))
            group = match.get("group", "")
            if isinstance(group, str) and group.startswith("Group "):
              grp = group.replace("Group ", "").strip()
            elif isinstance(group, dict):
              grp = group.get("name", "").replace("Group ", "").strip()
            else:
              continue
            if not grp or len(grp) != 1:
              continue
            key = f"{grp}_{team1}_{team2}"
            if score1 > score2:
              result = "1"
            elif score1 == score2:
              result = "X"
            else:
              result = "2"
            results[key] = result

          output = {
            "updated": __import__('datetime').datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
            "results": results
          }

          with open("porra-mundial/results.json", "w", encoding="utf-8") as f:
            json.dump(output, f, ensure_ascii=False, indent=2)

          print(f"✅ {len(results)} resultados guardados en results.json")
          PYEOF

      - name: Commit y push results.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add porra-mundial/results.json
          git diff --staged --quiet || git commit -m "🤖 Resultados actualizados $(date +'%Y-%m-%d %H:%M') CEST"
          git push
