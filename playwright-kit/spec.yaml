schemaVersion: "2"
kind: mixin
name: playwright
displayName: Playwright (Chromium)
description: >
  Instala Playwright con Chromium en un Docker sandbox (Ubuntu/ARM64 y AMD64).
  Incluye las dependencias de sistema necesarias para que Chromium arranque sin
  entorno gráfico. Pensado para automatización de navegador, scraping y
  capturas de pantalla desde el agente.

caps:
  network:
    allow:
      # npm — paquete @playwright/test
      - registry.npmjs.org
      - "*.npmjs.org"
      # Playwright CDN — binario de Chromium
      - playwright.download.prss.microsoft.com
      # apt — dependencias de sistema de Chromium
      # (Ubuntu amd64 + arm64; incluye el repo Docker que el template base añade)
      - archive.ubuntu.com
      - ports.ubuntu.com
      - security.ubuntu.com
      - download.docker.com

commands:
  install:
    - command: >-
        command -v npx >/dev/null 2>&1 || (apt-get update -qq &&
        apt-get install -y -qq nodejs npm 2>/dev/null);
        npm install -g --prefer-offline @playwright/test 2>/dev/null ||
        npm install -g @playwright/test;
        npx playwright install-deps chromium;
        npx playwright install chromium
      description: >
        Instala @playwright/test, las dependencias de sistema de Chromium
        (libpango, libxcomposite, etc.) y descarga el binario de Chromium.
        El guard 'command -v npx' hace el paso de npm idempotente.

agentContext: |
  ## Playwright (Chromium)

  Playwright con Chromium está instalado en este sandbox. Úsalo para
  automatización de navegador y capturas de pantalla sin entorno gráfico.

  ### Uso básico (script .mjs desde el directorio del proyecto)

  ```js
  import { chromium } from '@playwright/test';

  const browser = await chromium.launch({ args: ['--no-sandbox'] });
  const page = await browser.newPage();
  await page.setViewportSize({ width: 390, height: 844 }); // iPhone 14
  await page.goto('http://localhost:8080');
  await page.screenshot({ path: '/tmp/captura.png', fullPage: false });
  await browser.close();
  ```

  **Siempre pasa `--no-sandbox`** a `chromium.launch()` — el sandbox de
  Chrome no está disponible en este entorno.

  ### Capturar HTML estático con la CSS real del proyecto

  La forma más rápida de capturar componentes de la app sin necesitar
  autenticación es inyectar el HTML renderizado en una página con la CSS real:

  ```js
  import { chromium } from '@playwright/test';
  import { readFileSync } from 'fs';

  const css = readFileSync('./css/styles.css', 'utf8');
  const html = `<!DOCTYPE html>
  <html lang="es"><head><meta charset="UTF-8"/>
  <style>${css}</style></head>
  <body class="...">
    <!-- HTML del componente aquí -->
  </body></html>`;

  const browser = await chromium.launch({ args: ['--no-sandbox'] });
  const page = await browser.newPage();
  await page.setViewportSize({ width: 390, height: 300 });
  await page.setContent(html, { waitUntil: 'networkidle' });
  await page.screenshot({ path: '/tmp/componente.png', fullPage: true });
  await browser.close();
  ```

  ### Notas

  - El binario de Chromium está en `~/.cache/ms-playwright/`.
  - Para un servidor local: primero arráncalo (`python3 -m http.server 8080 &`)
    y luego navega a `http://localhost:8080`.
  - `page.route()` intercepta peticiones de red — útil para mockear APIs sin
    modificar el código fuente.
