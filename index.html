function isLocked(key){
  const t=MATCH_TIMES[key];
  if(!t)return false;
  const kickoff=new Date(t+":00+02:00");
  return Date.now()>=kickoff.getTime()-60*60*1000;
}

// ─── SCORING ──────────────────────────────────────────────────────────────────
function gPts(preds,results){let p=0;for(const k in results)if(preds[k]&&preds[k]===results[k])p++;return p;}
function podiumBonus(pod,fin){if(!pod||!fin)return 0;let p=0;if(pod[0]===fin[0])p+=5;if(pod[1]===fin[1])p+=3;if(pod[2]===fin[2])p+=2;return p;}

// ─── DATA ─────────────────────────────────────────────────────────────────────
async function loadData(){
  try{
    const[pls,resJson,sbRes]=await Promise.all([
      sbGet("porra_jugadores","select=*"),
      fetch("results.json?t="+Date.now()).then(r=>r.json()).catch(()=>({results:{}})),
      sbGet("porra_resultados","select=*&id=eq.1")
    ]);
    const players=Array.isArray(pls)?pls:[];
    // Base: resultados automáticos del JSON; override: correcciones manuales del admin en Supabase
    const groupResults={...(resJson.results||{})};
    if(Array.isArray(sbRes)&&sbRes[0])Object.assign(groupResults,sbRes[0].group_results||{});
    let rankChange=null,newRank=null;
    if(S.user){
      const sorted=players.map(p=>({name:p.nombre,pts:gPts(p.group_predictions||{},groupResults)})).sort((a,b)=>b.pts-a.pts);
      newRank=sorted.findIndex(p=>p.name===S.user)+1||null;
      if(newRank&&S.lastRank&&newRank!==S.lastRank)rankChange=S.lastRank-newRank;
    }
    ss({players,groupResults,loading:false,refreshing:false,rankChange,lastRank:newRank||S.lastRank||null});
    if(rankChange!==null)setTimeout(()=>ss({rankChange:null}),4000);
  }catch(e){console.error(e);ss({loading:false,refreshing:false});}
}

async function handleLogin(nombre){
  ss({loginBusy:true});
  try{
    await sbUpsert("porra_jugadores",{nombre,group_predictions:{},podium:null});
    await loadData();
    ss({user:nombre,loginBusy:false,pendingPreds:{},pendingPodium:null});
  }catch(e){console.error(e);ss({loginBusy:false});}
}

async function saveGroupPreds(){
  const me=S.players.find(p=>p.nombre===S.user);
  const merged={...(me?.group_predictions||{}),...S.pendingPreds};
  ss({savingGroup:true});
  await sbPatch("porra_jugadores","nombre=eq."+encodeURIComponent(S.user),{group_predictions:merged,updated_at:new Date().toISOString()});
  await loadData();
  ss({savingGroup:false,pendingPreds:{}});
}

async function savePodium(podium){
  ss({savingPodium:true});
  await sbPatch("porra_jugadores","nombre=eq."+encodeURIComponent(S.user),{podium,updated_at:new Date().toISOString()});
  await loadData();
  ss({savingPodium:false,pendingPodium:null});
}

async function saveResults(){
  const merged={...S.groupResults};
  for(const[k,v]of Object.entries(S.adminResults)){if(v===null)delete merged[k];else merged[k]=v;}
  ss({savingGroup:true});
  await sbPatch("porra_resultados","id=eq.1",{group_results:merged,last_updated:new Date().toISOString()});
  await loadData();
  ss({savingGroup:false,adminResults:{}});
}

function renderGrupos(){
  const me=S.players.find(p=>p.nombre===S.user);
  const myPreds={...(me?.group_predictions||{}),...S.pendingPreds};
  const predCount=Object.keys(myPreds).length;
  const g=S.activeGroup;
  const matches=GM[g];

  const groupBtns=Object.keys(GROUPS).map(gr=>{
    const keys=GM[gr].map(m=>gr+"_"+m[0]+"_"+m[1]);
    const withR=keys.filter(k=>S.groupResults[k]).length;
    const pending=keys.length-withR;
    const isActive=gr===g;
    const isDone=withR===keys.length&&withR>0;
    return`<button onclick="setGroup('${gr}')" style="padding:.4rem .2rem;border-radius:.5rem;font-weight:900;font-size:.85rem;border:none;cursor:pointer;background:${isActive?'#2563eb':isDone?'#dcfce7':'white'};color:${isActive?'white':isDone?'#166534':'#374151'}">
      <div>${gr}</div>
      <div style="font-size:.55rem;font-weight:600;color:${isActive?'rgba(255,255,255,.8)':isDone?'#16a34a':'#9ca3af'}">${isDone?'✅':pending+'⏳'}</div>
    </button>`;
  }).join("");

  const matchRows=matches.map(m=>{
    const key=g+"_"+m[0]+"_"+m[1];
    const hasR=!!S.groupResults[key];
    const pred=myPreds[key];
    const correct=hasR&&pred===S.groupResults[key];
    const wrong=hasR&&pred&&pred!==S.groupResults[key];
    const locked=isLocked(key);
    const blocked=hasR||locked;
    const bg=hasR?(correct?"background:#f0fdf4;border:1px solid #86efac":wrong?"background:#fef2f2;border:1px solid #fca5a5":"background:#f9fafb;border:1px solid #e5e7eb"):locked?"background:#fafafa;border:1px solid #e5e7eb":"background:#f9fafb;border:1px solid #e5e7eb";
    const badge=hasR
      ?`<span style="font-size:.65rem;font-weight:700;padding:2px 5px;border-radius:999px;background:${correct?'#dcfce7':wrong?'#fee2e2':'#f3f4f6'};color:${correct?'#166534':wrong?'#991b1b':'#6b7280'}">${correct?'+1✓':wrong?'✗':'—'}</span>`
      :locked?'<span style="font-size:.65rem;font-weight:700;padding:2px 5px;border-radius:999px;background:#fef9c3;color:#854d0e">🔒</span>'
      :'';
    return`<div style="display:flex;align-items:center;gap:.4rem;border-radius:.5rem;padding:.6rem;${bg}">
      <span style="font-size:.7rem;flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${fl(m[0])} ${m[0]}</span>
      <div style="display:flex;gap:3px;align-items:center">
        ${["1","X","2"].map(v=>`<button onclick="${blocked?'':('setPred(\''+key+'\',\''+v+'\')')}" style="width:34px;height:34px;border-radius:.4rem;font-weight:900;font-size:.85rem;border:2px solid ${pred===v?(hasR?(correct?'#22c55e':'#f87171'):'#2563eb'):'#e5e7eb'};cursor:${blocked?'default':'pointer'};background:${pred===v?(hasR?(correct?'#22c55e':'#f87171'):'#2563eb'):'white'};color:${pred===v?'white':'#9ca3af'};opacity:${locked&&!hasR?'0.4':'1'}">${v}</button>`).join("")}
        ${badge}
      </div>
      <span style="font-size:.7rem;flex:1;text-align:right;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${fl(m[1])} ${m[1]}</span>
    </div>`;
  }).join("");

  const myGroupKeys=matches.map(m=>g+"_"+m[0]+"_"+m[1]);
  const editableKeys=myGroupKeys.filter(k=>!S.groupResults[k]&&!isLocked(k));
  const editableSaved=editableKeys.length>0&&editableKeys.every(k=>(me?.group_predictions||{})[k]);
  const hasPendingInGroup=myGroupKeys.some(k=>S.pendingPreds[k]);
  const saveBtn=editableKeys.length===0
    ?`<p style="text-align:center;font-size:.75rem;color:#6b7280;margin-top:.5rem">Todos los partidos están bloqueados o tienen resultado oficial</p>`
    :(editableSaved&&!hasPendingInGroup)
    ?`<p style="text-align:center;font-size:.75rem;color:#16a34a;font-weight:700;margin-top:.5rem">✓ Pronósticos guardados</p>`
    :`<button onclick="doSavePreds()" style="width:100%;padding:.6rem;border-radius:.5rem;font-weight:900;font-size:.85rem;color:white;border:none;cursor:pointer;background:${S.savingGroup?'#9ca3af':'#2563eb'};margin-top:.5rem">${S.savingGroup?'Guardando...':'GUARDAR PRONÓSTICOS'}</button>`;

  return`
  ${card(`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.25rem"><h2 style="font-weight:900;color:#111;margin:0">Fase de Grupos</h2>${pill(predCount+"/"+TOTAL_MATCHES,predCount===TOTAL_MATCHES?"green":"yellow")}</div><p style="font-size:.7rem;color:#6b7280;margin:0">1=Local · X=Empate · 2=Visitante · 1pt por acierto · 🔒=bloqueado 1h antes</p>`)}
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px">${groupBtns}</div>
  ${card(`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem"><h3 style="font-weight:900;color:#111;margin:0">Grupo ${g}</h3></div>
    <div style="display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.75rem">${GROUPS[g].map(t=>`<span style="background:#f3f4f6;border-radius:.5rem;padding:.2rem .5rem;font-size:.7rem;font-weight:600">${fl(t)} ${t}</span>`).join("")}</div>
    <div style="display:flex;flex-direction:column;gap:.4rem">${matchRows}</div>
    <div style="display:flex;justify-content:space-between;font-size:.65rem;color:#9ca3af;padding:.25rem .1rem;margin-top:.25rem"><span>${Object.keys(myPreds).filter(k=>k.startsWith(g)).length}/${matches.length} pronosticados</span><span>🟢=acierto · 🔴=fallo</span></div>
    ${saveBtn}`)}`;
}

// ─── PÓDIUM ───────────────────────────────────────────────────────────────────
function renderPodium(){
  const me=S.players.find(p=>p.nombre===S.user);
  const saved=me?.podium||null;
  const form=S.pendingPodium||(saved?[...saved]:["","",""]);
  const used=form.filter(Boolean);
  const isSaved=saved&&!S.pendingPodium;
  const preview=isSaved?`<div style="background:#eff6ff;border-radius:.5rem;padding:.75rem;margin-bottom:1rem;display:flex;gap:.5rem">${saved.map((t,i)=>`<div style="text-align:center;flex:1"><p style="font-size:1.25rem;margin:0">${["🥇","🥈","🥉"][i]}</p><p style="font-size:.7rem;font-weight:700;margin:0;overflow:hidden;text-overflow:ellipsis">${fl(t)} ${t}</p></div>`).join("")}</div>`:"";
  const selStyle="width:100%;border:2px solid #e5e7eb;border-radius:.5rem;padding:.5rem .75rem;font-size:.85rem;font-weight:500;outline:none";
  const podForm=[["🥇 Campeón",0],["🥈 Subcampeón",1],["🥉 3er Puesto",2]].map(([label,idx])=>{
    const avail=ALL_TEAMS.filter(t=>!used.includes(t)||t===form[idx]).sort((a,b)=>a.localeCompare(b,"es"));
    return`<div><label style="display:block;font-size:.7rem;font-weight:700;color:#6b7280;margin-bottom:.25rem">${label}</label>
      <select onchange="setPodiumPos(${idx},this.value)" style="${selStyle}">
        <option value="">— Selecciona —</option>
        ${avail.map(t=>`<option value="${t}" ${form[idx]===t?'selected':''}>${fl(t)} ${t}</option>`).join("")}
      </select></div>`;
  }).join("");
  const allSel=form[0]&&form[1]&&form[2];
  const saveBtn=allSel
    ?`<button onclick="doSavePodium()" style="width:100%;margin-top:.75rem;padding:.65rem;border-radius:.5rem;font-weight:900;font-size:.85rem;color:white;border:none;cursor:pointer;background:${S.savingPodium?'#9ca3af':'#16a34a'}">${S.savingPodium?'Guardando...':'💾 GUARDAR PÓDIUM'}</button>`
    :isSaved?'<p style="text-align:center;font-size:.8rem;color:#16a34a;font-weight:700;margin-top:.5rem">✓ Pódium guardado</p>'
    :'<p style="text-align:center;font-size:.7rem;color:#9ca3af;margin-top:.5rem">Selecciona los 3 equipos para guardar</p>';
  const others=S.players.filter(p=>p.nombre!==S.user).map(p=>`
    <div style="display:flex;align-items:center;gap:.75rem;background:#f9fafb;border-radius:.5rem;padding:.75rem">
      <div style="width:32px;height:32px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-weight:900;color:#1d4ed8">${p.nombre[0].toUpperCase()}</div>
      <div style="flex:1"><p style="font-weight:700;font-size:.85rem;margin:0">${p.nombre}</p>
        ${p.podium?`<p style="font-size:.7rem;color:#6b7280;margin:0">🥇${p.podium[0]} · 🥈${p.podium[1]} · 🥉${p.podium[2]}</p>`:`<p style="font-size:.7rem;color:#9ca3af;font-style:italic;margin:0">Sin pronóstico aún</p>`}
      </div></div>`).join("");
  return`
  ${card(`<h2 style="font-weight:900;color:#111;margin:0 0 .25rem">Mi Pronóstico de Pódium</h2>
    <p style="font-size:.7rem;color:#6b7280;margin:0 0 1rem">Bonus final: 🥇+5pts · 🥈+3pts · 🥉+2pts</p>
    ${preview}<div style="display:flex;flex-direction:column;gap:.75rem">${podForm}</div>${saveBtn}`)}
  ${card(`<h3 style="font-weight:900;color:#111;margin:0 0 .75rem">Pódiums del grupo (${S.players.length})</h3>
    <div style="display:flex;flex-direction:column;gap:.4rem">${others||'<p style="text-align:center;font-size:.85rem;color:#9ca3af;padding:1rem 0;margin:0">Aún no hay otros participantes</p>'}</div>`)}`;
}

// ─── RANKING ──────────────────────────────────────────────────────────────────
function renderRanking(){
  const scores=S.players.map(p=>({
    name:p.nombre,
    gpts:gPts(p.group_predictions||{},S.groupResults),
    ppts:podiumBonus(p.podium,null),
    get total(){return this.gpts+this.ppts;}
  })).sort((a,b)=>b.total-a.total);
  const medals=["🥇","🥈","🥉"];
  const rows=scores.map((s,i)=>`
    <div style="display:flex;align-items:center;gap:.75rem;padding:.75rem;border-radius:.75rem;border:2px solid ${s.name===S.user?'#60a5fa':'transparent'};background:${s.name===S.user?'#eff6ff':'#f9fafb'}">
      <span style="font-size:1.25rem;width:28px;text-align:center">${medals[i]||(i+1)+"."}</span>
      <div style="flex:1">
        <p style="font-weight:900;color:#111;margin:0">${s.name}${s.name===S.user?' <span style="color:#3b82f6;font-size:.65rem">(tú)</span>':''}</p>
        <p style="font-size:.65rem;color:#9ca3af;margin:0">Grupos: ${s.gpts}pts · Pódium: ${s.ppts}pts</p>
      </div>
      <div style="text-align:right"><p style="font-size:1.5rem;font-weight:900;color:#111;margin:0">${s.total}</p><p style="font-size:.65rem;color:#9ca3af;margin:0">pts</p></div>
    </div>`).join("");
  const rules=[["⚽ Grupos (72 partidos)","1pt/acierto"],["🔟 Dieciseisavos","Base 2pts"],["8️⃣ Octavos","Base 4pts"],["4️⃣ Cuartos","Base 8pts"],["2️⃣ Semifinales","Base 16pts"],["🏅 3º/4º puesto","Base 24pts"],["🏆 Gran Final","Base 32pts"],["🎯 Bonus Pódium","+5+3+2pts"]];
  return`
  ${card(`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.25rem"><h2 style="font-weight:900;color:#111;margin:0">Clasificación en vivo</h2>${pill(S.players.length+" jugadores","blue")}</div>
    <p style="font-size:.7rem;color:#6b7280;margin:0 0 1rem">${Object.keys(S.groupResults).length} resultados aplicados</p>
    <div style="display:flex;flex-direction:column;gap:.4rem">${rows||'<p style="text-align:center;color:#9ca3af;padding:2rem 0;margin:0">Aún no hay participantes</p>'}</div>`)}
  ${card(`<h3 style="font-weight:900;color:#111;margin:0 0 .75rem">📋 Puntuación por fase</h3>
    <div style="display:flex;flex-direction:column;gap:.4rem">${rules.map(([l,r],i)=>`<div style="display:flex;justify-content:space-between;font-size:.85rem;padding-bottom:.4rem;${i<rules.length-1?'border-bottom:1px solid #f3f4f6':''}"><span style="color:#6b7280">${l}</span><span style="font-weight:700">${r}</span></div>`).join("")}</div>`)}`;
}

// ─── ADMIN ────────────────────────────────────────────────────────────────────
function renderAdmin(){
  if(!S.adminUnlocked){
    return card(`<div style="text-align:center">
      <div style="font-size:3rem;margin-bottom:.75rem">🔒</div>
      <h2 style="font-weight:900;color:#111;margin:0 0 .25rem">Zona Admin</h2>
      <p style="font-size:.8rem;color:#6b7280;margin:0 0 1.5rem">Introduce la clave para acceder</p>
      <input id="adminPwdInput" type="password" style="width:100%;border:2px solid #e5e7eb;border-radius:.5rem;padding:.75rem 1rem;font-size:1.2rem;font-weight:500;outline:none;text-align:center;letter-spacing:.3em" placeholder="••••"/>
      <button onclick="checkAdminPwd()" style="width:100%;margin-top:.75rem;padding:.75rem;border-radius:.5rem;font-weight:900;color:white;font-size:1rem;border:none;cursor:pointer;background:#dc2626">ENTRAR</button>
      ${S.adminPwdError?'<p style="color:#dc2626;font-size:.8rem;font-weight:700;margin-top:.5rem">❌ Clave incorrecta</p>':""}
    </div>`);
  }
  const rc=Object.keys(S.groupResults).length;
  const ag=S.adminGroup||"A";
  const groupBtns=Object.keys(GROUPS).map(g=>{
    const keys=GM[g].map(m=>g+"_"+m[0]+"_"+m[1]);
    const withR=keys.filter(k=>S.groupResults[k]).length;
    const done=withR===keys.length&&withR>0;
    return`<button onclick="setAdminGroup('${g}')" style="padding:.5rem;border-radius:.5rem;font-weight:900;font-size:.85rem;border:2px solid ${ag===g?'#dc2626':'#e5e7eb'};cursor:pointer;background:${ag===g?'#dc2626':done?'#dcfce7':'white'};color:${ag===g?'white':done?'#166534':'#374151'};position:relative">
      ${g}${done?'<span style="position:absolute;top:-4px;right:-4px;font-size:.6rem">✅</span>':withR>0?`<span style="position:absolute;top:-4px;right:-4px;font-size:.6rem">${withR}/${keys.length}</span>`:''}
    </button>`;
  }).join("");
  const matchRows=GM[ag].map(m=>{
    const key=ag+"_"+m[0]+"_"+m[1];
    const cur=S.groupResults[key];
    const pend=(S.adminResults||{})[key];
    const display=pend!==undefined?pend:cur;
    const hasVal=!!display;
    return`<div style="display:flex;align-items:center;gap:.4rem;background:${hasVal?'#fff9f0':'#f9fafb'};border:1px solid ${hasVal?'#fed7aa':'#e5e7eb'};border-radius:.5rem;padding:.6rem">
      <span style="font-size:.7rem;flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${fl(m[0])} ${m[0]}</span>
      <div style="display:flex;gap:3px;align-items:center">
        ${["1","X","2"].map(v=>`<button onclick="setAdminResult('${key}','${v}')" style="width:34px;height:34px;border-radius:.4rem;font-weight:900;font-size:.85rem;border:2px solid ${display===v?'#dc2626':'#e5e7eb'};cursor:pointer;background:${display===v?'#dc2626':'white'};color:${display===v?'white':'#9ca3af'}">${v}</button>`).join("")}
        <button onclick="clearAdminResult('${key}')" style="width:28px;height:28px;border-radius:.4rem;font-size:.85rem;border:2px solid ${hasVal?'#fca5a5':'#e5e7eb'};cursor:pointer;background:${hasVal?'#fee2e2':'#f3f4f6'};color:${hasVal?'#dc2626':'#d1d5db'}">✕</button>
      </div>
      <span style="font-size:.7rem;flex:1;text-align:right;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${fl(m[1])} ${m[1]}</span>
    </div>`;
  }).join("");
  const hasPending=Object.keys(S.adminResults||{}).length>0;
  const stats=[["1","Victorias local"],["X","Empates"],["2","Victorias visit."]].map(([v,l])=>
    `<div style="background:#f9fafb;border-radius:.5rem;padding:.75rem;text-align:center"><p style="font-size:1.5rem;font-weight:900;margin:0">${Object.values(S.groupResults).filter(r=>r===v).length}</p><p style="font-size:.65rem;color:#6b7280;margin:0">${l}</p></div>`
  ).join("");
  return`
  ${card(`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.25rem"><h2 style="font-weight:900;color:#111;margin:0">🔧 Introducir Resultados</h2>${pill(rc+"/"+TOTAL_MATCHES+" jugados",rc===TOTAL_MATCHES?"green":"yellow")}</div>
    <p style="font-size:.7rem;color:#6b7280;margin:0 0 .75rem">Selecciona el grupo, marca resultados con 1/X/2 y borra con ✕</p>
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:.75rem">${groupBtns}</div>
    <div style="display:flex;flex-direction:column;gap:.4rem;margin-bottom:.75rem">${matchRows}</div>
    <button onclick="doSaveResults()" ${!hasPending||S.savingGroup?'disabled':''} style="width:100%;padding:.7rem;border-radius:.5rem;font-weight:900;font-size:.9rem;color:white;border:none;cursor:${hasPending&&!S.savingGroup?'pointer':'not-allowed'};background:${hasPending&&!S.savingGroup?'#dc2626':'#9ca3af'}">
      ${S.savingGroup?"Guardando...":hasPending?"💾 GUARDAR RESULTADOS":"Selecciona resultados para guardar"}
    </button>`)}
  ${rc>0?card(`<h3 style="font-weight:900;color:#111;margin:0 0 .75rem">📊 Estadísticas</h3><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem">${stats}</div>`):""}
  <div style="background:#fef9c3;border:1px solid #fde047;border-radius:.75rem;padding:.75rem"><p style="font-size:.75rem;color:#854d0e;margin:0;font-weight:500">⚠️ Los resultados que introduzcas afectan a la puntuación de todos los participantes.</p></div>`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  if(!app)return;
  if(S.loading){app.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a2240"><div style="text-align:center;color:white"><div style="font-size:3rem;margin-bottom:.5rem">⚽</div><p style="font-weight:700;margin:0">Conectando...</p></div></div>`;return;}
  if(!S.user){app.innerHTML=renderLogin();return;}
  const content={grupos:renderGrupos,podium:renderPodium,marcador:renderRanking,admin:renderAdmin}[S.tab]?.();
  app.innerHTML=`${renderHeader()}<div style="max-width:600px;margin:0 auto;padding:1rem;display:flex;flex-direction:column;gap:1rem">${content||""}</div>`;
}

// ─── HANDLERS ─────────────────────────────────────────────────────────────────
window.doLogin=()=>{const v=document.getElementById("loginInput")?.value?.trim();if(v)handleLogin(v);};
window.doLogout=()=>ss({user:null,pendingPreds:{},pendingPodium:null,adminResults:{},adminUnlocked:false,adminPwdError:false});
window.setTab=t=>ss({tab:t});
window.setGroup=g=>ss({activeGroup:g,pendingPreds:{}});
window.setPred=(key,val)=>ss({pendingPreds:{...S.pendingPreds,[key]:val}});
window.doSavePreds=()=>{if(!S.savingGroup)saveGroupPreds();};
window.setPodiumPos=(idx,val)=>{const me=S.players.find(p=>p.nombre===S.user);const base=S.pendingPodium||(me?.podium?[...me.podium]:["","",""]);const u=[...base];u[idx]=val;ss({pendingPodium:u});};
window.doSavePodium=()=>{if(!S.savingPodium&&S.pendingPodium&&S.pendingPodium[0]&&S.pendingPodium[1]&&S.pendingPodium[2])savePodium(S.pendingPodium);};
window.checkAdminPwd=()=>{const v=document.getElementById("adminPwdInput")?.value||"";if(v==="S&R")ss({adminUnlocked:true,adminPwdError:false});else ss({adminPwdError:true});};
window.setAdminGroup=g=>ss({adminGroup:g,adminResults:{}});
window.setAdminResult=(key,val)=>ss({adminResults:{...S.adminResults,[key]:val}});
window.clearAdminResult=key=>ss({adminResults:{...S.adminResults,[key]:null}});
window.doSaveResults=()=>{if(!S.savingGroup&&Object.keys(S.adminResults||{}).length>0)saveResults();};
window.doRefresh=()=>{if(!S.refreshing){ss({refreshing:true});loadData();}};

document.addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!S.user)window.doLogin();
  if(e.key==="Enter"&&S.tab==="admin"&&!S.adminUnlocked)window.checkAdminPwd();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
loadData();
</script>
</body>
</html>
