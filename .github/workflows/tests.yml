name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Run unit tests
        run: npm test

  # Integration contra un Supabase local real (Postgres + PostgREST + GoTrue),
  # orquestado con testcontainers: RLS por el camino real + flujo de invitaciones.
  # Obligatorio: si falla, el workflow falla → y las migraciones (gated por
  # workflow_run) no se aplican. El runner de ubuntu-latest ya trae Docker.
  integration:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install deps
        run: npm ci

      - name: Integration tests (testcontainers · Supabase local)
        run: npm run test:integration
