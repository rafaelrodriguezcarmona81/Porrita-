const SB_HEADERS = {
  "Content-Type": "application/json",
  "apikey": SB_KEY,
  "Authorization": "Bearer " + SB_KEY
};
async function sbGet(table, params) {
  const r = await fetch(SB_URL + "/rest/v1/" + table + "?" + (params||""), { headers: SB_HEADERS });
  return r.json();
}
async function sbUpsert(table, body) {
  const r = await fetch(SB_URL + "/rest/v1/" + table, {
    method: "POST",
    headers: { ...SB_HEADERS, "Prefer": "resolution=merge-duplicates,return=representation" },
    body: JSON.stringify(body)
  });
  return r.json();
}
async function sbPatch(table, params, body) {
  const r = await fetch(SB_URL + "/rest/v1/" + table + "?" + params, {
    method: "PATCH",
    headers: { ...SB_HEADERS, "Prefer": "return=representation" },
    body: JSON.stringify(body)
  });
  return r.json();
}

// ─── SCORING ──────────────────────────────────────────────────────────────────
function calcGroupPts(preds, results) {
  let pts = 0;
  for (const k in results) if (preds[k] && preds[k] === results[k]) pts++;
  return pts;
}
function calcPodiumBonus(podium, final) {
  if (!podium || !final) return 0;
  let pts = 0;
  if (podium[0] === final[0]) pts += 5;
  if (podium[1] === final[1]) pts += 3;
  if (podium[2] === final[2]) pts += 2;
  return pts;
}

// ─── DATA LOADING ─────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const [pls, res] = await Promise.all([
      sbGet("porra_jugadores", "select=*"),
      sbGet("porra_resultados", "select=*&id=eq.1")
    ]);
    const players = Array.isArray(pls) ? pls : [];
    let groupResults = {}, lastSummary = "", lastUpdated = null;
    if (Array.isArray(res) && res[0]) {
      groupResults = res[0].group_results || {};
      lastSummary = res[0].last_summary || "";
      lastUpdated = res[0].last_updated || null;
    }
    setState({ players, groupResults, lastSummary, lastUpdated, loading: false });
  } catch(e) {
    console.error(e);
    setState({ loading: false });
  }
}

async function handleLogin(nombre) {
  setState({ loginBusy: true });
  try {
    await sbUpsert("porra_jugadores", { nombre, group_predictions: {}, podium: null });
    await loadData();
    setState({ user: nombre, loginBusy: false, pendingPreds: {} });
  } catch(e) {
    setState({ loginBusy: false });
  }
}

async function saveGroupPreds(group) {
  const me = STATE.players.find(p => p.nombre === STATE.user);
  const merged = { ...(me?.group_predictions || {}), ...STATE.pendingPreds };

    group_predictions: merged, updated_at: new Date().toISOString()
  });
  await loadData();
  setState({ savingGroup: false, pendingPreds: {} });
}

async function saveGroupResults(results) {

async function handleAIUpdate() {
  setState({ aiLoading: true, aiStatus: null, aiError: null });
  try {
    const matchList = Object.entries(GROUP_MATCHES).flatMap(([grp, ms]) =>
      ms.map(([l, v]) => grp+"_"+l+"_"+v+" → "+l+" vs "+v+" (Grupo "+grp+")")
    ).join("\n");
    const prompt = `Eres un asistente que consulta resultados del Mundial de Fútbol 2026 (FIFA World Cup 2026), jugado en USA, Canadá y México desde el 11 de junio de 2026.\n\nBusca en internet los resultados actuales de la fase de grupos y devuelve SOLO un JSON válido sin markdown:\n\n{"resultados":{"CLAVE":"RESULTADO"},"resumen":"1-2 frases"}\n\nCLAVE exactamente como abajo. RESULTADO: "1"=local, "X"=empate, "2"=visitante. Solo partidos ya jugados.\n\n${matchList}\n\nResponde ÚNICAMENTE con el JSON.`;
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514", max_tokens: 1000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content.filter(b => b.type === "text").map(b => b.text).join("");
    const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
    const merged = { ...STATE.groupResults, ...(parsed.resultados || {}) };
    await sbPatch("porra_resultados", "id=eq.1", {
      group_results: merged, last_summary: parsed.resumen || "",
      last_updated: new Date().toISOString()
    });
    await loadData();
    setState({ aiStatus: "✅ " + Object.keys(parsed.resultados||{}).length + " resultados actualizados. " + (parsed.resumen||""), aiLoading: false });
  } catch(e) {
    setState({ aiError: "No se pudieron obtener los resultados. Inténtalo de nuevo.", aiLoading: false });
  }
}

    </div>
    ${saveBtn}
  </div>
  <p style="text-align:center;font-size:.65rem;color:#9ca3af">🔄 Se actualiza automáticamente cada 30 segundos</p>`;
}

function renderPodiumTab() {
  const { players, user, pendingPodium, savingPodium } = STATE;
  const me = players.find(p => p.nombre === user);
  const savedPodium = me?.podium || null;
  // Use pendingPodium while editing, fall back to saved
  const formPodium = pendingPodium || savedPodium || ["","",""];
  const isSaved = savedPodium && !pendingPodium;

  const podiumPreview = savedPodium && !pendingPodium ? `
    <div style="background:#eff6ff;border-radius:.5rem;padding:.75rem;margin-bottom:1rem;display:flex;gap:.5rem">
      ${savedPodium.map((t,i)=>`<div style="text-align:center;flex:1"><p style="font-size:1.25rem;margin:0">${["🥇","🥈","🥉"][i]}</p><p style="font-size:.75rem;margin:0">${fl(t)}</p><p style="font-size:.65rem;font-weight:700;margin:0;overflow:hidden;text-overflow:ellipsis">${t}</p></div>`).join("")}
    </div>` : "";

  const selStyle = "width:100%;border:2px solid #e5e7eb;border-radius:.5rem;padding:.5rem .75rem;font-size:.85rem;font-weight:500;outline:none;box-sizing:border-box";
  const used = formPodium.filter(Boolean);

  const podiumForm = [["🥇 Campeón",0],["🥈 Subcampeón",1],["🥉 3er Puesto",2]].map(([label,idx])=>{
    const avail = ALL_TEAMS.filter(t => !used.includes(t) || t === formPodium[idx]);
    return `<div>
      <label style="display:block;font-size:.7rem;font-weight:700;color:#6b7280;margin-bottom:.25rem">${label}</label>
      <select onchange="setPodiumPos(${idx}, this.value)" style="${selStyle}">
        <option value="">— Selecciona —</option>
        ${avail.map(t=>`<option value="${t}" ${formPodium[idx]===t?'selected':''}>${fl(t)} ${t}</option>`).join("")}
      </select>
    </div>`;
  }).join("");

  const otherPlayers = players.filter(p => p.nombre !== user).map(p => `
    <div style="display:flex;align-items:center;gap:.75rem;background:#f9fafb;border-radius:.5rem;padding:.75rem">
      <div style="width:32px;height:32px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-weight:900;color:#1d4ed8">${p.nombre[0].toUpperCase()}</div>
      <div style="flex:1">
        <p style="font-weight:700;font-size:.85rem;margin:0">${p.nombre}</p>
        ${p.podium ? `<p style="font-size:.7rem;color:#6b7280;margin:0">🥇${p.podium[0]} · 🥈${p.podium[1]} · 🥉${p.podium[2]}</p>` : `<p style="font-size:.7rem;color:#9ca3af;font-style:italic;margin:0">Sin pronóstico aún</p>`}
      </div>
    </div>`).join("");

  return `
  <div style="background:white;border-radius:.75rem;padding:1rem;box-shadow:0 1px 3px rgba(0,0,0,.1)">
    <h2 style="font-weight:900;color:#111;margin:0 0 .25rem">Mi Pronóstico de Pódium</h2>
    <p style="font-size:.7rem;color:#6b7280;margin:0 0 1rem">Bonus final: 🥇+5pts · 🥈+3pts · 🥉+2pts</p>
    ${podiumPreview}
    <div style="display:flex;flex-direction:column;gap:.75rem">${podiumForm}</div>
    ${pendingPodium && pendingPodium.filter(Boolean).length === 3
      ? `<button onclick="doSavePodium()" style="width:100%;margin-top:.75rem;padding:.65rem;border-radius:.5rem;font-weight:900;font-size:.85rem;color:white;border:none;cursor:pointer;background:${savingPodium?'#9ca3af':'#16a34a'}">${savingPodium?'Guardando...':'💾 GUARDAR PÓDIUM'}</button>`
      : isSaved ? '<p style="text-align:center;font-size:.8rem;color:#16a34a;font-weight:700;margin-top:.5rem">✓ Pódium guardado</p>'
      : '<p style="text-align:center;font-size:.7rem;color:#9ca3af;margin-top:.5rem">Selecciona los 3 equipos para guardar</p>'
    }
  </div>
  <div style="background:white;border-radius:.75rem;padding:1rem;box-shadow:0 1px 3px rgba(0,0,0,.1)">
    <h3 style="font-weight:900;color:#111;margin:0 0 .75rem">Pódiums de todos (${players.length})</h3>
    <div style="display:flex;flex-direction:column;gap:.4rem">
      ${otherPlayers || '<p style="text-align:center;font-size:.85rem;color:#9ca3af;padding:1rem 0;margin:0">Aún no hay otros participantes</p>'}
    </div>
  </div>`;
}

function renderRankingTab() {
  const { players, groupResults } = STATE;
  const scores = players.map(p => {
    const gpts = calcGroupPts(p.group_predictions||{}, groupResults);
    const ppts = calcPodiumBonus(p.podium, null);
    return { name: p.nombre, gpts, ppts, total: gpts+ppts };
  }).sort((a,b) => b.total - a.total);

  const medals = ["🥇","🥈","🥉"];
  const rows = scores.map((s,i) => `
    <div style="display:flex;align-items:center;gap:.75rem;padding:.75rem;border-radius:.75rem;border:2px solid ${s.name===STATE.user?'#60a5fa':'transparent'};background:${s.name===STATE.user?'#eff6ff':'#f9fafb'}">
      <span style="font-size:1.25rem;width:28px;text-align:center">${medals[i]||((i+1)+".")}</span>
      <div style="flex:1">
        <p style="font-weight:900;color:#111;margin:0">${s.name} ${s.name===STATE.user?'<span style="color:#3b82f6;font-size:.65rem">(tú)</span>':''}</p>
        <p style="font-size:.65rem;color:#9ca3af;margin:0">Grupos: ${s.gpts}pts · Pódium: ${s.ppts}pts</p>
      </div>
      <div style="text-align:right">
        <p style="font-size:1.5rem;font-weight:900;color:#111;margin:0">${s.total}</p>
        <p style="font-size:.65rem;color:#9ca3af;margin:0">pts</p>
      </div>
    </div>`).join("");

  const rules = [["⚽ Grupos (72 partidos)","1pt/acierto"],["🔟 Dieciseisavos","Base 2pts"],["8️⃣ Octavos","Base 4pts"],["4️⃣ Cuartos","Base 8pts"],["2️⃣ Semifinales","Base 16pts"],["🏅 3º/4º puesto","Base 24pts"],["🏆 Gran Final","Base 32pts"],["🎯 Bonus Pódium","+5+3+2pts"]];

  return `
  <div style="background:white;border-radius:.75rem;padding:1rem;box-shadow:0 1px 3px rgba(0,0,0,.1)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.25rem">
      <h2 style="font-weight:900;color:#111;margin:0">Clasificación en vivo</h2>
      ${pill(players.length+" jugadores","blue")}
    </div>
    <p style="font-size:.7rem;color:#6b7280;margin:0 0 1rem">${Object.keys(groupResults).length} resultados oficiales aplicados</p>
    <div style="display:flex;flex-direction:column;gap:.4rem">
      ${rows || '<p style="text-align:center;color:#9ca3af;padding:2rem 0;margin:0">Aún no hay participantes</p>'}
    </div>
  </div>
  <div style="background:white;border-radius:.75rem;padding:1rem;box-shadow:0 1px 3px rgba(0,0,0,.1)">
    <h3 style="font-weight:900;color:#111;margin:0 0 .75rem">📋 Puntuación por fase</h3>
    <div style="display:flex;flex-direction:column;gap:.4rem">
      ${rules.map(([l,r],i)=>`<div style="display:flex;justify-content:space-between;font-size:.85rem;padding-bottom:.4rem;${i<rules.length-1?'border-bottom:1px solid #f3f4f6':''}"><span style="color:#6b7280">${l}</span><span style="font-weight:700">${r}</span></div>`).join("")}
    </div>
  </div>`;
}

function renderIATab() {
  const { groupResults, aiLoading, aiStatus, aiError, lastSummary, lastUpdated } = STATE;
  const resultCount = Object.keys(groupResults).length;
  const total = Object.values(GROUP_MATCHES).flat().length;
  const stats = [["1","Victorias local"],["X","Empates"],["2","Victorias visit."]].map(([v,l])=>
    `<div style="background:#f9fafb;border-radius:.5rem;padding:.75rem;text-align:center">
      <p style="font-size:1.5rem;font-weight:900;margin:0">${Object.values(groupResults).filter(r=>r===v).length}</p>
      <p style="font-size:.65rem;color:#6b7280;margin:0">${l}</p>
    </div>`
  ).join("");

  return `
  <div style="background:white;border-radius:.75rem;box-shadow:0 1px 3px rgba(0,0,0,.1);overflow:hidden">
    <div style="padding:1rem">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
        <div>
          <h3 style="font-weight:900;color:#111;margin:0 0 .1rem;display:flex;align-items:center;gap:.4rem">🤖 Actualización automática ${pill("IA","purple")}</h3>
          <p style="font-size:.7rem;color:#6b7280;margin:0">Busca resultados reales del Mundial en internet</p>
        </div>
        <div style="text-align:right">
          <p style="font-size:1.5rem;font-weight:900;margin:0">${resultCount}<span style="font-size:.8rem;color:#9ca3af">/${total}</span></p>
          <p style="font-size:.65rem;color:#9ca3af;margin:0">resultados</p>
        </div>
      </div>
      <button onclick="doAIUpdate()" ${aiLoading?'disabled':''} style="width:100%;padding:.75rem;border-radius:.75rem;font-weight:900;color:white;font-size:.85rem;border:none;cursor:${aiLoading?'not-allowed':'pointer'};background:${aiLoading?'#9ca3af':'linear-gradient(135deg,#7c3aed,#4f46e5)'}">
        ${aiLoading ? '⏳ Buscando en internet...' : '🔍 Actualizar resultados ahora'}
      </button>
      ${aiStatus ? `<div style="margin-top:.75rem;background:#f0fdf4;border:1px solid #86efac;border-radius:.5rem;padding:.75rem;font-size:.75rem;color:#166534;font-weight:500">${aiStatus}</div>` : ""}
      ${aiError ? `<div style="margin-top:.75rem;background:#fef2f2;border:1px solid #fca5a5;border-radius:.5rem;padding:.75rem;font-size:.75rem;color:#991b1b">⚠️ ${aiError}</div>` : ""}
    </div>
    <div style="background:#f9fafb;border-top:1px solid #f3f4f6;padding:.5rem 1rem">
      <p style="font-size:.65rem;color:#9ca3af;margin:0">💡 Cualquier participante puede actualizar. Modo admin manual: pulsa ⚽ × 5</p>
    </div>
  </div>
  ${lastSummary ? `<div style="background:white;border-radius:.75rem;padding:1rem;box-shadow:0 1px 3px rgba(0,0,0,.1)">
    <h3 style="font-weight:900;color:#111;margin:0 0 .5rem">📰 Último informe</h3>
    <p style="font-size:.85rem;color:#4b5563;margin:0">${lastSummary}</p>
    ${lastUpdated ? `<p style="font-size:.65rem;color:#9ca3af;margin:.5rem 0 0">Actualizado: ${new Date(lastUpdated).toLocaleString("es-ES")}</p>` : ""}
  </div>` : ""}
  ${resultCount > 0 ? `<div style="background:white;border-radius:.75rem;padding:1rem;box-shadow:0 1px 3px rgba(0,0,0,.1)">
    <h3 style="font-weight:900;color:#111;margin:0 0 .75rem">Estadísticas de resultados</h3>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem">${stats}</div>
  </div>` : ""}`;
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  if (!app) return;

  if (STATE.loading) {
    app.innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a2240">
      <div style="text-align:center;color:white"><div style="font-size:3rem;margin-bottom:.5rem">⚽</div><p style="font-weight:700;margin:0">Conectando con Supabase...</p></div>
    </div>`;
    return;
  }

  if (!STATE.user) { app.innerHTML = renderLogin(); return; }

  const tabContent = {
    grupos: renderGroupTab,
    podium: renderPodiumTab,
    marcador: renderRankingTab,
    ia: renderIATab
  }[STATE.tab]?.() || "";

  app.innerHTML = `
    ${renderHeader()}
    <div style="max-width:600px;margin:0 auto;padding:1rem;display:flex;flex-direction:column;gap:1rem">
      ${tabContent}
    </div>`;
}

// ─── EVENT HANDLERS ───────────────────────────────────────────────────────────
window.doLogin = function() {
  const v = document.getElementById("loginInput")?.value?.trim();
  if (v) handleLogin(v);
};
window.doLogout = function() { setState({ user: null, pendingPreds: {}, adminResults: {}, pendingPodium: null }); };
window.setTab = function(t) { setState({ tab: t }); };
window.setGroup = function(g) { setState({ activeGroup: g, pendingPreds: {}, adminResults: {} }); };
window.tapAdmin = function() {
  const t = STATE.adminTap + 1;
  if (t >= 5) { setState({ adminMode: !STATE.adminMode, adminTap: 0, adminResults: {} }); }
  else setState({ adminTap: t });
};
window.setPred = function(key, val) {
  const preds = { ...STATE.pendingPreds, [key]: val };
  setState({ pendingPreds: preds });
};
window.doSavePreds = async function() {
  if (STATE.savingGroup) return;
  await saveGroupPreds(STATE.activeGroup);
};
window.setAdminResult = function(key, val) {
  const adminResults = { ...(STATE.adminResults||{}), [key]: val };
  setState({ adminResults });
};
window.doSaveResults = async function() {
  if (STATE.savingGroup || !STATE.adminResults) return;
  setState({ savingGroup: true });
  await saveGroupResults(STATE.adminResults);
  setState({ savingGroup: false, adminResults: {} });
};
window.setPodiumPos = function(idx, val) {
  const me = STATE.players.find(p => p.nombre === STATE.user);
  const base = STATE.pendingPodium || (me?.podium ? [...me.podium] : ["","",""]);
  const updated = [...base];
  updated[idx] = val;
  setState({ pendingPodium: updated });
};
window.doSavePodium = async function() {
  if (STATE.savingPodium || !STATE.pendingPodium) return;
  const podium = STATE.pendingPodium;
  if (!podium[0] || !podium[1] || !podium[2]) return;
  setState({ savingPodium: true });
  await savePodium(podium);
  setState({ savingPodium: false, pendingPodium: null });
};
window.doAIUpdate = function() { handleAIUpdate(); };

// Keyboard enter on login
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !STATE.user) window.doLogin();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
